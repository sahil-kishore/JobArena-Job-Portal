<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Job</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
<div class="logo">Job<span>Arena</span></div>
<div>
<a class="btn" th:href="@{/}">Home</a>
<a class="btn btn-danger" th:href="@{/logout}">Logout</a>
</div>
</div>

<div class="container">

<div class="card">
<h1>Edit Job</h1>

<form th:action="@{/employer/jobs/update}" method="post">

<input type="hidden" name="id" th:value="${job.id}">

<input type="text" name="title" placeholder="Job Title" th:value="${job.title}">
<input type="text" name="company" placeholder="Company" th:value="${job.company}">
<input type="text" name="location" placeholder="Location" th:value="${job.location}">
<input type="text" name="experience" placeholder="Experience" th:value="${job.experience}">
<input type="text" name="jobType" placeholder="Job Type" th:value="${job.jobType}">
<textarea name="description" placeholder="Description" th:text="${job.description}"></textarea>

<button class="btn" type="submit">Update Job</button>

</form>
</div>

</div>
</body>
</html>
