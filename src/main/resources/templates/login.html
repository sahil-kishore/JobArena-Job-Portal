
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>JobArena</title>
<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#1e3a8a,#2563eb,#38bdf8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.box{
width:420px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
}
.logo{
font-size:42px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}
.logo span{
color:#2563eb;
}
.sub{
text-align:center;
margin-bottom:25px;
color:#64748b;
}
input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #cbd5e1;
}
button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}
a{
text-decoration:none;
color:#2563eb;
}
.center{
text-align:center;
margin-top:20px;
}
</style>
</head>
<body>

<div class="box">

<div class="logo">Job<span>Arena</span></div>
<div class="sub">Modern Job Portal Platform</div>

<form th:action="@{/login}" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="center">
<a th:href="@{/register}">Create New Account</a>
</div>

</div>

</body>
</html>
