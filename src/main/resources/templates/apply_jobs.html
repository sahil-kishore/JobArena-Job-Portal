<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Available Jobs - JobArena</title>

    <link rel="stylesheet" th:href="@{/css/apply_jobs.css}">
</head>

<body>

    <div class="topbar">

        <div class="brand">
            Job<span>Arena</span>
        </div>

        <div class="nav-links">

            <a class="nav-btn"
               href="/applicant/applicant_dashboard">
                Home
            </a>

            <a class="nav-btn"
               href="/jobs/apply_jobs">
                Search Jobs
            </a>

            <a class="nav-btn"
               href="/applicant/profile">
                Profile
            </a>

            <a class="nav-btn"
               href="/applications/track_status">
                Applied Jobs
            </a>

            <a class="nav-btn logout"
               href="/logout">
                Logout
            </a>

        </div>

    </div>

    <div class="container">

        <h1>Available Jobs</h1>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${param.success}" class="alert success">
            Job applied successfully!
        </div>

        <!-- ERROR MESSAGE -->
        <div th:if="${param.error}" class="alert warning">
            Something went wrong.
        </div>

        <!-- ALREADY APPLIED -->
        <div th:if="${param.alreadyApplied}" class="alert warning">
            You already applied for this job.
        </div>

        <!-- SEARCH -->
        <form class="search-bar" method="get" action="/jobs/apply_jobs">

            <input type="text"
                   name="keyword"
                   placeholder="Search jobs by title..."
                   th:value="${param.keyword}">

            <button type="submit">
                Search
            </button>

        </form>

        <!-- JOB LIST -->
        <div class="job-grid">

            <div class="job-card"
                 th:each="job : ${jobs}">

                <h2 class="job-title"
                    th:text="${job.title}">
                </h2>

                <p class="job-detail">
                    <strong>Company:</strong>
                    <span th:text="${job.company}"></span>
                </p>

                <p class="job-detail">
                    <strong>Location:</strong>
                    <span th:text="${job.location}"></span>
                </p>

                <p class="job-detail">
                    <strong>Experience:</strong>
                    <span th:text="${job.experience}"></span>
                </p>

                <p class="job-detail">
                    <strong>Job Type:</strong>
                    <span th:text="${job.jobType}"></span>
                </p>

                <p class="job-description">
                    <strong>Description:</strong>
                    <span th:text="${job.description}"></span>
                </p>

                <!-- APPLY BUTTON -->
                <form th:action="@{/jobs/apply/{id}(id=${job.id})}"
                      method="post">

                    <button type="submit"
                            class="apply-btn">
                        Apply
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
